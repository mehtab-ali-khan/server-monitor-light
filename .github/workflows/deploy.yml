name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_PROJECT_PATH }}
            git fetch origin
            git checkout main
            git reset --hard origin/main
            docker compose -f prod/docker-compose.yml build backend
            docker compose -f prod/docker-compose.yml run --rm backend python manage.py migrate
            docker compose -f prod/docker-compose.yml up -d --no-build
            docker compose -f prod/docker-compose.yml restart nginx
            docker compose -f prod/docker-compose.yml ps
            docker image prune -f
